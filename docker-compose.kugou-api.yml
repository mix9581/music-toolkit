version: '3.8'

services:
  kugou-api:
    image: node:18-alpine
    container_name: kugou-music-api
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
    volumes:
      - kugou-api-data:/app
    command: sh -c "
      if [ ! -f package.json ]; then
        echo 'Cloning KuGouMusicApi...';
        apk add --no-cache git;
        git clone --depth 1 https://github.com/MakcRe/KuGouMusicApi.git /tmp/kugou;
        cp -r /tmp/kugou/* /app/;
        rm -rf /tmp/kugou;
        npm install;
      fi;
      npm run dev
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  kugou-api-data:
